name: nvim-config

on:
  push:
    branches:
      - '**'
  # Canary: float every plugin to its newest commit to catch upstream breakage
  # before a local `:Lazy update` does. Runs on the default branch.
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  # Allow triggering the canary (or a normal run) by hand.
  workflow_dispatch: {}

jobs:
  test:
    name: Verify Neovim config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Isolated, cacheable XDG environment that vim/tests/run.sh will reuse.
      XDG_CONFIG_HOME: ${{ github.workspace }}/.xdg/config
      XDG_DATA_HOME: ${{ github.workspace }}/.xdg/data
      XDG_STATE_HOME: ${{ github.workspace }}/.xdg/state
      XDG_CACHE_HOME: ${{ github.workspace }}/.xdg/cache
      # Scheduled runs float to newest plugins (canary); everything else tests
      # the exact versions pinned in lazy-lock.json.
      LAZY_MODE: ${{ github.event_name == 'schedule' && 'latest' || 'pinned' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned Neovim version
        id: nvim-pin
        run: echo "version=$(cat vim/.nvim-version)" >> "$GITHUB_OUTPUT"

      - name: Install Neovim ${{ steps.nvim-pin.outputs.version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ steps.nvim-pin.outputs.version }}

      - name: Install build dependencies
        # build-essential provides the C compiler tree-sitter parsers need.
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Record Neovim version
        id: nvim
        run: echo "version=$(nvim --version | head -1 | tr -d ' ')" >> "$GITHUB_OUTPUT"

      # Restore the lazy.nvim plugin directory. The key folds in the lockfile
      # (the authoritative version identifier) and the plugin specs, so an exact
      # hit means identical plugin versions; the restore-keys prefixes warm-start
      # from the latest cache for this OS + Neovim version + mode when versions
      # have moved. Mode is part of the key so the floating canary never feeds
      # newer commits into the pinned cache.
      - name: Restore plugin cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.XDG_DATA_HOME }}/nvim/lazy
          key: lazy-${{ runner.os }}-${{ steps.nvim.outputs.version }}-${{ env.LAZY_MODE }}-${{ hashFiles('vim/lazy-lock.json', 'vim/lua/plugins/**/*.lua', 'vim/init.lua') }}
          restore-keys: |
            lazy-${{ runner.os }}-${{ steps.nvim.outputs.version }}-${{ env.LAZY_MODE }}-
            lazy-${{ runner.os }}-${{ steps.nvim.outputs.version }}-

      - name: Run config tests
        run: ./vim/tests/run.sh

      # Hash the lock file lazy wrote during the test run. This pins the exact
      # commit of every plugin, so it is the authoritative version identifier.
      - name: Hash resolved plugin versions
        id: lock
        if: always()
        run: |
          lock="$XDG_CONFIG_HOME/nvim/lazy-lock.json"
          if [ -f "$lock" ]; then
            echo "hash=$(sha256sum "$lock" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Save plugin cache
        if: always() && steps.lock.outputs.hash != ''
        uses: actions/cache/save@v4
        with:
          path: ${{ env.XDG_DATA_HOME }}/nvim/lazy
          key: lazy-${{ runner.os }}-${{ steps.nvim.outputs.version }}-${{ env.LAZY_MODE }}-${{ steps.lock.outputs.hash }}
